<section class="lista-card">
  <div class="lista-header">
    <div>
      <span class="eyebrow">Painel</span>
      <h2>Ocorrências urbanas</h2>
    </div>
    <span class="badge">{{ ocorrencias.length }}</span>
  </div>

  @if (ocorrencias.length) {
    <div class="lista-items">
      @for (ocorrencia of ocorrencias; track trackById($index, ocorrencia)) {
        <button
          type="button"
          class="ocorrencia-item"
          [class.selected]="ocorrencia.id === ocorrenciaSelecionadaId"
          (click)="selectOcorrencia.emit(ocorrencia.id)"
        >
          <div class="item-top">
            <strong>{{ ocorrencia.titulo }}</strong>
            <span class="status" [class.resolvido]="ocorrencia.status === 'resolvido'">
              {{ ocorrencia.status }}
            </span>
          </div>

          <p>{{ ocorrencia.descricao }}</p>

          <div class="meta">
            <span>{{ ocorrencia.tipo }}</span>
            <span>{{ ocorrencia.rua }} • {{ ocorrencia.bairro }}</span>
            <span>{{ ocorrencia.dataCriacao | date: 'dd/MM/yyyy' }}</span>
          </div>
        </button>
      }
    </div>
  } @else {
    <div class="empty-state">
      Nenhuma ocorrência corresponde aos filtros aplicados.
    </div>
  }
</section>
